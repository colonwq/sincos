name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  python-format:
    name: Python formatting (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

  sin-cos-lookup:
    name: Sin/cos lookup vs computed (CI angles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run lookup comparison tests
        run: pytest tests/test_sincos_lookup_ci.py -v
